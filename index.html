<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perceptual Image Hashing Similarity Analyzer</title>
    <style>
        :root {
            --surface-dark: #0f172a;
            --surface-card: #1e293b;
            --border-color: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-purple: #a855f7;
            --accent-green: #22c55e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--surface-dark);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Workspace Grid Layout */
        .sidebar {
            width: 360px;
            background-color: var(--surface-card);
            border-right: 1px solid var(--border-color);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
        }

        .main-workspace {
            flex: 1;
            padding: 32px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* Components & Controls */
        h1 { font-size: 1.35rem; font-weight: 700; color: #ffffff; letter-spacing: -0.02em; }
        label { font-size: 0.75rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; display: block; margin-bottom: 6px; }
        
        .upload-zone {
            border: 2px dashed var(--border-color);
            padding: 24px;
            border-radius: 8px;
            text-align: center;
            background: rgba(15, 23, 42, 0.4);
            cursor: pointer;
            transition: border-color 0.2s;
        }
        .upload-zone:hover { border-color: var(--accent-purple); }

        .slider-container { margin-top: 10px; }
        .slider-val { font-weight: bold; color: var(--accent-purple); margin-left: 4px; }
        input[type="range"] { width: 100%; accent-color: var(--accent-purple); margin-top: 6px; }

        .btn-action {
            background-color: var(--accent-purple);
            color: white; border: none; padding: 12px; border-radius: 6px;
            font-weight: 600; cursor: pointer; text-align: center; font-size: 0.9rem;
        }
        .btn-action:hover { background-color: #9333ea; }

        /* Match Results Viewport Panels */
        .results-section h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 12px; border-bottom: 1px solid var(--border-color); padding-bottom: 6px; }
        
        .match-card {
            background-color: var(--surface-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .match-header { display: flex; justify-content: space-between; align-items: center; }
        .match-pct { font-size: 1.15rem; font-weight: 700; color: var(--accent-green); }
        
        .match-images-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .image-box { text-align: center; background-color: var(--surface-dark); padding: 10px; border-radius: 6px; border: 1px solid #334155; }
        .image-box img { max-width: 100%; max-height: 180px; object-fit: contain; border-radius: 4px; }
        .image-meta { font-size: 0.8rem; color: var(--text-muted); margin-top: 6px; font-family: monospace; }

        /* Hidden canvas helper for background bitmap sampling operations */
        #processingCanvas { display: none; }
    </style>
</head>
<body>

    <!-- CONTROL PANEL SIDEBAR -->
    <div class="sidebar">
        <div>
            <h1>🖼️ Perceptual Match Engine</h1>
            <p style="font-size: 0.8rem; color: var(--text-muted); margin-top: 4px;">Image Hashing Duplicate Tool</p>
        </div>

        <hr style="border: 0; border-top: 1px solid var(--border-color);">

        <div class="upload-zone" onclick="document.getElementById('imageLoader').click()">
            <span style="font-size: 0.85rem; color: var(--text-muted);">Click to open multi-file image batch picker</span>
            <input type="file" id="imageLoader" multiple accept="image/*" style="display:none;" onchange="handleImageBatchUpload(event)">
        </div>

        <div class="slider-container">
            <label>Similarity Threshold: <span id="thresholdDisplay" class="slider-val">85%</span></label>
            <input type="range" id="thresholdSlider" min="70" max="100" value="85" oninput="updateThresholdText(this.value)">
        </div>

        <button class="btn-action" onclick="runSimilarityScan()">Scan For Duplicates</button>
        
        <div id="statusReport" style="font-size: 0.8rem; color: var(--text-muted); text-align: center;">
            Status: Awaiting source assets...
        </div>
    </div>

    <!-- MAIN DASHBOARD CONTENT -->
    <div class="main-workspace">
        <div class="results-section">
            <h2>⚖️ Visual Overlap Detection Duplicates</h2>
            <div id="matchesWrapper">
                <p style="color: var(--text-muted); font-style: italic; font-size: 0.9rem;">Upload files and run the duplicate scanner pipeline to check metrics.</p>
            </div>
        </div>
    </div>

    <!-- Background Processing Canvas -->
    <canvas id="processingCanvas" width="8" height="8"></canvas>

    <script>
        let imageDataset = [];

        function updateThresholdText(val) {
            document.getElementById('thresholdDisplay').innerText = val + "%";
        }

        // --- CORE PROCESSOR: RENDER FINGERPRINT VIA AVERAGE HASH (aHash) ---
        async function computeAverageHash(imageElement) {
            const canvas = document.getElementById('processingCanvas');
            const ctx = canvas.getContext('2d');
            
            // 1. Force downsample mapping target dimensions to 8x8 pixels
            ctx.drawImage(imageElement, 0, 0, 8, 8);
            
            // 2. Extract explicit grayscale pixel matrix metrics
            const imgData = ctx.getImageData(0, 0, 8, 8);
            const data = imgData.data;
            
            let grayValues = [];
            let totalLuminance = 0;

            for (let i = 0; i < data.length; i += 4) {
                // Compute standard luminance coefficients formula channel map
                let gray = 0.299 * data[i] + 0.587 * data[i+1] + 0.114 * data[i+2];
                grayValues.push(gray);
                totalLuminance += gray;
            }

            // Calculate the mean value across all 64 downsampled pixels
            let meanLuminance = totalLuminance / 64;

            // 3. Build the binary perceptual bitstring hash map matrix
            let bitstringHash = "";
            for (let gray of grayValues) {
                bitstringHash += (gray >= meanLuminance) ? "1" : "0";
            }
            return bitstringHash;
        }

        // --- BATCH STREAMING ENTRY LOADER ---
        function handleImageBatchUpload(event) {
            const files = event.target.files;
            if (!files.length) return;

            imageDataset = []; // Clear old assets cache
            document.getElementById('statusReport').innerText = `Loading ${files.length} assets...`;

            let loadedCounter = 0;

            for (let file of files) {
                const reader = new FileReader();
                reader.onload = function(fEvent) {
                    const img = new Image();
                    img.onload = async function() {
                        const hashFingerprint = await computeAverageHash(img);
                        imageDataset.push({
                            name: file.name,
                            src: fEvent.target.result,
                            hash: hashFingerprint
                        });
                        
                        loadedCounter++;
                        if (loadedCounter === files.length) {
                            document.getElementById('statusReport').innerText = `Indexed ${imageDataset.length} files successfully!`;
                        }
                    }
                    img.src = fEvent.target.result;
                }
                reader.readAsDataURL(file);
            }
        }

        // --- PAIRWISE COMBINATORIAL ANALYSIS LOOP ---
        function runSimilarityScan() {
            const container = document.getElementById('matchesWrapper');
            container.innerHTML = ""; // Flush previous layout
            
            if (imageDataset.length < 2) {
                container.innerHTML = `<p style="color:var(--text-muted);">💡 Upload at least two images to compare files.</p>`;
                return;
            }

            const matchThreshold = parseInt(document.getElementById('thresholdSlider').value);
            let totalMatchesFound = 0;

            // Evaluate distinct pairs across all loaded images
            for (let i = 0; i < imageDataset.length; i++) {
                for (let j = i + 1; j < imageDataset.length; j++) {
                    const assetA = imageDataset[i];
                    const assetB = imageDataset[j];

                    // Calculate the Hamming Distance (count the number of bits that differ)
                    let mismatchedBitsCount = 0;
                    for (let b = 0; b < 64; b++) {
                        if (assetA.hash[b] !== assetB.hash[b]) mismatchedBitsCount++;
                    }

                    // Convert the bit distance into a similarity match percentage
                    let similarityPercentage = ((64 - mismatchedBitsCount) / 64) * 100;

                    if (similarityPercentage >= matchThreshold) {
                        totalMatchesFound++;
                        renderMatchCard(assetA, assetB, similarityPercentage, mismatchedBitsCount);
                    }
                }
            }

            if (totalMatchesFound === 0) {
                container.innerHTML = `<p style="color: var(--accent-green); font-weight:600;">🎉 No duplicate pairs found above your selected ${matchThreshold}% threshold limit.</p>`;
            }
        }

        // --- DYNAMIC CARD COMPILING ENGINE ---
        function renderMatchCard(a, b, percentage, distance) {
            const wrapper = document.getElementById('matchesWrapper');
            const card = document.createElement('div');
            card.className = 'match-card';

            card.innerHTML = `
                <div class="match-header">
                    <div><strong>Overlap Detected Pair</strong></div>
                    <div class="match-pct">${percentage.toFixed(1)}% Match</div>
                </div>
                <div class="match-images-grid">
                    <div class="image-box">
                        <img src="${a.src}" alt="Image Frame A">
                        <div class="image-meta">${a.name}</div>
                    </div>
                    <div class="image-box">
                        <img src="${b.src}" alt="Image Frame B">
                        <div class="image-meta">${b.name}</div>
                    </div>
                </div>
                <div style="font-size:0.8rem; color:var(--text-muted);">
                    Hamming Bit Discrepancy Count: <code>${distance} bits</code> variance out of 64 total perceptual matrix blocks.
                </div>
            `;
            wrapper.appendChild(card);
        }
    </script>
</body>
</html>
